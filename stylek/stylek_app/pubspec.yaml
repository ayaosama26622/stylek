name: stylek_app
description: "A fashion shopping Flutter app."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  easy_localization: ^3.0.8
  extended_svg_picture: ^1.0.0
  flutter:
    sdk: flutter
  gap: ^3.0.1
  global_context_menu: ^0.0.1
  go_router: ^17.2.3
  go_router_paths: ^0.2.2
  http: ^1.5.0
  image_picker: ^1.2.1
  intl: 0.20.2
  lottie: ^3.3.3
  pinput: ^6.0.2
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0
  smart_auth: ^3.2.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/

